<article
  class="group relative rounded-2xl overflow-hidden bg-white/80 backdrop-blur border border-sky-100 shadow-md transition-all duration-300 hover:shadow-2xl hover:-translate-y-2">

  <!-- IMAGE -->
  <figure class="h-44 overflow-hidden">
    <img [src]="project().image" alt="preview"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />

    <!-- overlay suave -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-80"></div>
  </figure>

  <!-- glow hover -->
  <div
    class="absolute inset-0 bg-gradient-to-tr from-sky-400/0 via-transparent to-violet-400/0 group-hover:from-sky-400/10 group-hover:to-violet-400/10 transition-all duration-500">
  </div>

  <div class="card-body relative z-10 space-y-3">

    <!-- TITLE -->
    <h3 class="card-title text-lg font-bold group-hover:text-sky-600 transition-colors">
      {{ project().name }}
    </h3>

    <!-- DESCRIPTION -->
    <p class="text-sm text-base-content/70 leading-relaxed">
      {{ project().summary }}
    </p>

    <!-- STACK -->
    <div class="flex flex-wrap gap-2 pt-1">
      @for (item of project().stack; track item) {
      <span class="badge badge-sm bg-sky-100 text-sky-600 border-none hover:scale-105 transition-transform">
        {{ item }}
      </span>
      }
    </div>

    <!-- ACTIONS -->
    <div class="card-actions mt-4 flex-wrap gap-2">

      <a (click)="onViewDetails()"
        class="btn bg-sky-500 hover:bg-sky-600 text-white border-none shadow-md hover:scale-105 transition-all duration-300">
        Ver Detalles
      </a>
    </div>

  </div>
</article>
