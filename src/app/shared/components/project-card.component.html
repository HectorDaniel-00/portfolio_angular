<article class="card bg-base-200 shadow-xl transition-shadow hover:shadow-2xl">
  <div class="card-body">
    <h3 class="card-title text-lg">{{ project().name }}</h3>
    <p class="text-base-content/80 text-sm">{{ project().summary }}</p>
    <div class="mt-2 flex flex-wrap gap-2">
      @for (item of project().stack; track item) {
        <span class="badge badge-neutral badge-sm">{{ item }}</span>
      }
    </div>
    <div class="card-actions mt-4 flex-wrap justify-start gap-2">
      <app-cta-button label="Ver demo" [href]="project().liveUrl" />
      <app-cta-button label="Repositorio" variant="outline" [href]="project().repositoryUrl" />
    </div>
  </div>
</article>
