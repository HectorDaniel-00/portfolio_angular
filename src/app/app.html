<div class="bg-base-100 text-base-content flex min-h-screen flex-col">
  <header class="bg-base-200/80 border-base-content/10 sticky top-0 z-50 border-b backdrop-blur-md">
    <nav class="navbar mx-auto max-w-6xl px-4" aria-label="Principal">
      <div class="flex-1">
        <a routerLink="/" class="btn btn-ghost text-lg font-semibold">Daniel.dev</a>
      </div>
      <div class="hidden flex-none md:block">
        <ul class="menu menu-horizontal gap-0 px-1">
          <li>
            <a
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="rounded-lg"
            >
              Inicio
            </a>
          </li>
          <li>
            <a routerLink="/projects" routerLinkActive="active" class="rounded-lg">Proyectos</a>
          </li>
          <li>
            <a routerLink="/skills" routerLinkActive="active" class="rounded-lg">Skills</a>
          </li>
          <li>
            <a routerLink="/contact" routerLinkActive="active" class="rounded-lg">Contacto</a>
          </li>
        </ul>
      </div>
      <div class="flex-none md:hidden">
        <details class="dropdown dropdown-end">
          <summary class="btn btn-ghost btn-square" aria-label="Abrir menú">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              class="inline-block h-6 w-6 stroke-current"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </summary>
          <ul
            class="menu dropdown-content bg-base-200 rounded-box border-base-content/10 z-50 mt-3 w-52 border p-2 shadow"
          >
            <li>
              <a
                routerLink="/"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }"
                >Inicio</a
              >
            </li>
            <li><a routerLink="/projects" routerLinkActive="active">Proyectos</a></li>
            <li><a routerLink="/skills" routerLinkActive="active">Skills</a></li>
            <li><a routerLink="/contact" routerLinkActive="active">Contacto</a></li>
          </ul>
        </details>
      </div>
    </nav>
  </header>

  <main id="main-content" class="mx-auto w-full max-w-6xl flex-1 px-4 py-8 md:py-10">
    <router-outlet />
  </main>

  <footer class="border-base-content/10 bg-base-200/50 border-t py-6">
    <p class="text-base-content/60 text-center text-sm">Construido con Angular, Tailwind CSS y DaisyUI.</p>
  </footer>
</div>
