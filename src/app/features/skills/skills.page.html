<section class="relative px-4 py-12 md:py-16 bg-gradient-to-br from-white via-sky-50 to-violet-100 rounded-box overflow-hidden">

  <!-- decoraciones -->
  <div class="absolute top-0 left-0 w-72 h-72 bg-sky-300/20 blur-3xl rounded-full"></div>
  <div class="absolute bottom-0 right-0 w-72 h-72 bg-violet-300/20 blur-3xl rounded-full"></div>

  <!-- HEADER -->
  <div class="max-w-5xl mx-auto mb-10 text-center md:text-left animate-fade-in">

    <span class="inline-block px-4 py-1 text-sm font-semibold text-sky-600 bg-sky-100 rounded-full mb-3">
      🧠 Habilidades
    </span>

    <h1 class="text-3xl md:text-4xl font-extrabold">
      Skills & Tecnologías
    </h1>

    <p class="text-base-content/70 mt-3 max-w-2xl mx-auto md:mx-0">
      Tecnologías y herramientas que utilizo para diseñar, construir y escalar aplicaciones modernas.
    </p>
  </div>

  <!-- GRID -->
  <div class="max-w-6xl mx-auto grid gap-6 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3">

    @for (group of skillGroups; track group.title) {
      <article class="group relative rounded-2xl bg-white/80 backdrop-blur border border-sky-100 shadow-md transition-all duration-300 hover:shadow-2xl hover:-translate-y-2">

        <!-- glow hover -->
        <div class="absolute inset-0 bg-gradient-to-tr from-sky-400/0 via-transparent to-violet-400/0 group-hover:from-sky-400/10 group-hover:to-violet-400/10 transition-all duration-500"></div>

        <div class="card-body relative z-10">

          <!-- TITLE -->
          <h2 class="card-title text-lg font-bold group-hover:text-sky-600 transition-colors">
            {{ group.title }}
          </h2>

          <!-- SKILLS -->
          <div class="mt-4 flex flex-wrap gap-2">

            @for (item of group.items; track item) {
              <span class="px-3 py-1 text-sm font-medium rounded-full bg-sky-100 text-sky-600 hover:bg-sky-500 hover:text-white transition-all duration-300 cursor-default">
                {{ item }}
              </span>
            }

          </div>

        </div>

      </article>
    }

  </div>
</section>
