<section class="relative px-4 py-12 md:py-16 bg-gradient-to-br from-white via-sky-50 to-violet-100 rounded-box overflow-hidden">

  <!-- decoraciones -->
  <div class="absolute top-0 left-0 w-72 h-72 bg-sky-300/20 blur-3xl rounded-full"></div>
  <div class="absolute bottom-0 right-0 w-72 h-72 bg-violet-300/20 blur-3xl rounded-full"></div>

  <div class="max-w-2xl mx-auto space-y-8 text-center md:text-left animate-fade-in">

    <!-- HEADER -->
    <div>
      <span class="inline-block px-4 py-1 text-sm font-semibold text-sky-600 bg-sky-100 rounded-full mb-3">
        📩 Contacto
      </span>

      <h1 class="text-3xl md:text-4xl font-extrabold">
        Hablemos
      </h1>

      <p class="text-base-content/70 mt-3">
        Si quieres colaborar en un proyecto, tienes una idea o simplemente quieres conectar, aquí tienes mis canales.
      </p>
    </div>

    <!-- LINKS -->
    <ul class="flex flex-col gap-4">

      @for (link of socialLinks; track link.label) {
        <li>
          <a 
            [href]="link.url" 
            target="_blank"
            class="group flex items-center justify-between px-5 py-4 rounded-xl bg-white/80 backdrop-blur border border-sky-100 shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300"
          >

            <!-- label -->
            <span class="font-medium group-hover:text-sky-600 transition-colors">
              {{ link.label }}
            </span>

            <!-- arrow -->
            <span class="text-sky-500 transform group-hover:translate-x-1 transition-transform duration-300">
              →
            </span>

          </a>
        </li>
      }

    </ul>

  </div>
</section>
